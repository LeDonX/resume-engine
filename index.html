<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张三的简历</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%232563eb'/%3E%3Cpath d='M20 16h17l7 7v25a4 4 0 0 1-4 4H20a4 4 0 0 1-4-4V20a4 4 0 0 1 4-4Z' fill='white'/%3E%3Cpath d='M37 16v9h9' fill='none' stroke='%232563eb' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M24 31h16M24 39h16M24 47h10' fill='none' stroke='%232563eb' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
<div class="app-shell">
        <!-- 左侧表单区 -->
        <aside class="form-panel no-print" data-form-theme="business">
            <div class="form-header sticky top-0">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">简历生成器</h1>
                        <p class="text-xs text-slate-500 mt-1">左侧编辑内容，右侧实时预览</p>
                    </div>
                    <!-- 核心操作按钮组（生成PDF放在绝对突出的位置） -->
                    <button type="button" id="print-pdf" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all flex items-center gap-1.5">
                        <i class="fas fa-file-pdf"></i> 生成 PDF
                    </button>
                </div>
                
                <!-- 次要操作按钮组 -->
                <div class="flex gap-2">
                    <button type="button" id="reset-data" class="flex-1 bg-slate-100 text-slate-600 text-[11px] font-semibold px-3 py-2 rounded-lg hover:bg-slate-200 transition-colors flex justify-center items-center gap-1.5">
                        <i class="fas fa-rotate-left"></i> 重置示例
                    </button>
                    <button type="button" id="import-data" class="flex-1 bg-slate-100 text-slate-600 text-[11px] font-semibold px-3 py-2 rounded-lg hover:bg-slate-200 transition-colors flex justify-center items-center gap-1.5">
                        <i class="fas fa-file-import"></i> 导入 JSON
                    </button>
                    <button type="button" id="export-data" data-testid="export-data" class="flex-1 bg-slate-100 text-slate-600 text-[11px] font-semibold px-3 py-2 rounded-lg hover:bg-slate-200 transition-colors flex justify-center items-center gap-1.5">
                        <i class="fas fa-file-export"></i> 导出 JSON
                    </button>
                </div>
                
                <input id="import-file" type="file" accept=".json,application/json" class="hidden">
                <p id="form-status" data-testid="form-status" class="mt-2 text-xs text-slate-500"></p>
            </div>

            <div id="form-root" class="form-scroll space-y-6"></div>
        </aside>

        <!-- 右侧预览区 -->
        <main class="preview-panel print-p-0 print-m-0">
            <div id="resume-root"></div>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
