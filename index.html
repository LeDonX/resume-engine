<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张三的简历</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%232563eb'/%3E%3Cpath d='M20 16h17l7 7v25a4 4 0 0 1-4 4H20a4 4 0 0 1-4-4V20a4 4 0 0 1 4-4Z' fill='white'/%3E%3Cpath d='M37 16v9h9' fill='none' stroke='%232563eb' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M24 31h16M24 39h16M24 47h10' fill='none' stroke='%232563eb' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
<div class="app-shell">
        <!-- 左侧表单区 -->
        <aside class="form-panel no-print">
            
            <!-- 🌟 重新设计的极简高级头部 🌟 -->
            <div class="form-header sticky top-0 z-20 border-b border-slate-200/80 bg-white/85 px-6 pt-5 pb-3.5 backdrop-blur-xl">
                
                <!-- 上半部分：标题与核心操作 -->
                <div class="flex items-end justify-between mb-4">
                    <div>
                        <h1 class="text-xl font-black tracking-tight text-slate-900">简历生成器</h1>
                        <p class="mt-0.5 text-[11px] font-bold text-slate-400">实时编辑，所见即所得</p>
                    </div>
                    
                    <button type="button" id="print-pdf" class="btn-sci-fi">
    <div class="btn-sci-fi-inner"></div>
    <span class="btn-sci-fi-content">
        <i class="fas fa-satellite-dish btn-sci-fi-icon"></i>
        生成 PDF
    </span>
</button>
                </div>
                
                <!-- 下半部分：次要工具组与状态反馈 -->
                <div class="flex items-center justify-between">
                    
                    <!-- 连体工具栏 (Segmented Control 风格) -->
                    <div class="flex items-center rounded-lg bg-slate-100/70 p-1 ring-1 ring-slate-200/60">
                        <button type="button" id="reset-data" class="flex items-center gap-1.5 rounded-md px-3 py-1.5 text-[11px] font-bold text-slate-500 transition-all hover:bg-white hover:text-slate-800 hover:shadow-sm" title="重置为默认数据">
                            <i class="fas fa-rotate-left"></i> 重置
                        </button>
                        <div class="h-3 w-px bg-slate-200/80"></div>
                        <button type="button" id="import-data" class="flex items-center gap-1.5 rounded-md px-3 py-1.5 text-[11px] font-bold text-slate-500 transition-all hover:bg-white hover:text-slate-800 hover:shadow-sm" title="导入 JSON">
                            <i class="fas fa-file-import"></i> 导入
                        </button>
                        <div class="h-3 w-px bg-slate-200/80"></div>
                        <button type="button" id="export-data" data-testid="export-data" class="flex items-center gap-1.5 rounded-md px-3 py-1.5 text-[11px] font-bold text-slate-500 transition-all hover:bg-white hover:text-slate-800 hover:shadow-sm" title="导出 JSON">
                            <i class="fas fa-file-export"></i> 导出
                        </button>
                    </div>

                    <!-- 极致缩小的状态提示 (带动画) -->
                    <div class="flex items-center justify-end pl-2 max-w-[160px]">
                        <p id="form-status" data-testid="form-status"></p>
                    </div>
                </div>

                <input id="import-file" type="file" accept=".json,application/json" class="hidden">
            </div>

            <div id="form-root" class="form-scroll px-5 pt-6 pb-8 space-y-4"></div>
        </aside>

        <!-- 右侧预览区 -->
        <main class="preview-panel print-p-0 print-m-0">
            <div id="resume-root"></div>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
