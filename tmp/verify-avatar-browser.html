<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Avatar Browser Verification</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    #app { width: 1280px; height: 2400px; border: 0; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <p id="status">running</p>
  <iframe id="app" src="/%E7%AE%80%E5%8E%86.html" title="resume app verification frame"></iframe>
  <pre id="result"></pre>
  <script>
    const resultNode = document.getElementById('result');
    const statusNode = document.getElementById('status');
    const frame = document.getElementById('app');

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    async function report(payload) {
      try {
        await fetch('/__report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (_error) {
        // ignore reporting failure in page UI path
      }
    }

    async function waitForFrameLoad() {
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('iframe load timeout')), 15000);
        frame.onload = () => {
          clearTimeout(timeout);
          resolve();
        };
      });
    }

    async function loadFixture(path, type) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`fixture fetch failed: ${path}`);
      }
      const blob = await response.blob();
      const name = path.split('/').pop();
      return new File([blob], name, { type });
    }

    async function run() {
      await waitForFrameLoad();
      const win = frame.contentWindow;
      const doc = win.document;
      const app = win.__resumeApp__;
      assert(app, 'resume app not available');

      win.localStorage.removeItem('resume-generator-draft-v1');
      doc.getElementById('reset-data').click();

      const evidence = {};

      app.openAvatarCropper('空头像');
      app.confirmAvatarCrop();
      assert(app.getResumeData().profileImage === '', 'confirming empty avatar should not persist fallback image');
      evidence.emptyAvatarConfirmPreserved = true;

      const uploadFile = await loadFixture('/tests/fixtures/avatar-ok.png', 'image/png');
      await win.handleAvatarUpload(uploadFile);
      evidence.uploadStatus = app.getStatusText();
      assert(evidence.uploadStatus.includes('请在裁切框中调整后确认'), 'crop guidance status missing');
      assert(app.getAvatarCropState(), 'crop state missing after upload');
      const initialFeedback = doc.querySelector('[data-testid="avatar-crop-feedback"]');
      const initialConfirm = doc.querySelector('[data-testid="avatar-crop-confirm"]');
      const initialZoomControl = doc.querySelector('[data-testid="avatar-zoom-control"]');
      assert(initialFeedback && initialFeedback.textContent.includes('还不能应用'), 'invalid crop feedback missing');
      assert(initialConfirm && initialConfirm.disabled, 'confirm button should be disabled before crop is valid');
      assert(initialZoomControl && Number(initialZoomControl.min) < 1, 'zoom slider min should track full-image preview zoom');
      assert(!doc.querySelector('[data-testid="avatar-position-readout"]'), 'position block should be removed');
      assert(initialConfirm.textContent.trim() === '应用头像', 'confirm button label should stay stable when disabled');
      assert(initialFeedback && getComputedStyle(initialFeedback).color !== 'rgb(148, 163, 184)', 'crop feedback text should not be washed out');
      assert(doc.querySelector('[data-testid="avatar-crop-center"]'), 'quick center action missing');
      assert(doc.querySelector('[data-testid="avatar-crop-show-full"]'), 'quick show-full action missing');
      assert(doc.querySelector('[data-testid="avatar-crop-fill-frame"]'), 'quick fill-frame action missing');

      doc.querySelector('[data-testid="avatar-crop-fill-frame"]').click();
      const frameAfterFill = app.getAvatarCropState().frame;
      evidence.frameAfterFill = frameAfterFill;
      assert(frameAfterFill.zoom >= 1, 'fill-frame action should restore valid zoom');
      assert(frameAfterFill.offsetX === 0 && frameAfterFill.offsetY === 0, 'fill-frame action should center image');
      assert(!doc.querySelector('[data-testid="avatar-crop-confirm"]').disabled, 'fill-frame action should enable confirm');

      doc.querySelector('[data-testid="avatar-crop-show-full"]').click();
      const frameAfterShowFull = app.getAvatarCropState().frame;
      evidence.frameAfterShowFull = frameAfterShowFull;
      assert(frameAfterShowFull.zoom <= frameAfterFill.zoom, 'show-full action should not increase zoom');
      assert(frameAfterShowFull.offsetX === 0 && frameAfterShowFull.offsetY === 0, 'show-full action should center image');
      assert(doc.querySelector('[data-testid="avatar-crop-confirm"]').disabled, 'show-full action should return to invalid state');

      app.dragAvatarCropFrame(30, -20, 420, 420);
      doc.querySelector('[data-testid="avatar-crop-center"]').click();
      const frameAfterCenter = app.getAvatarCropState().frame;
      evidence.frameAfterCenter = frameAfterCenter;
      assert(frameAfterCenter.offsetX === 0 && frameAfterCenter.offsetY === 0, 'center action should reset offsets');

      win.applyFieldUpdate({ dataset: { section: 'avatarFrame', field: 'zoom' }, type: 'range', value: '1.72' });
      const zoomReadout = doc.querySelector('[data-testid="avatar-zoom-readout"]');
      assert(zoomReadout && zoomReadout.textContent.includes('1.72x'), 'zoom readout did not update');
      assert(!doc.querySelector('[data-testid="avatar-crop-confirm"]').disabled, 'confirm button should enable after valid zoom');
      assert(doc.querySelector('[data-testid="avatar-crop-confirm"]').textContent.trim() === '应用头像', 'confirm button label should stay stable when enabled');

      const dragSurface = doc.querySelector('[data-testid="avatar-drag-surface"]');
      dragSurface.dispatchEvent(new WheelEvent('wheel', { deltaY: 120, bubbles: true, cancelable: true }));
      const zoomAfterWheelDown = app.getAvatarCropState().frame.zoom;
      dragSurface.dispatchEvent(new WheelEvent('wheel', { deltaY: -120, bubbles: true, cancelable: true }));
      const zoomAfterWheelUp = app.getAvatarCropState().frame.zoom;
      evidence.zoomAfterWheel = { down: zoomAfterWheelDown, up: zoomAfterWheelUp };
      assert(zoomAfterWheelDown < 1.72, 'mouse wheel down should zoom out');
      assert(zoomAfterWheelUp > zoomAfterWheelDown, 'mouse wheel up should zoom in');

      app.dragAvatarCropFrame(24, -30, 420, 420);
      const frameAfterDrag = app.getAvatarCropState().frame;
      evidence.frameAfterDrag = frameAfterDrag;
      assert(frameAfterDrag.zoom >= 1.7, 'zoom not applied');
      assert(frameAfterDrag.offsetX !== 0 || frameAfterDrag.offsetY !== 0, 'drag did not update frame offsets');
      assert(doc.querySelector('[data-testid="avatar-crop-modal"]'), 'crop modal missing');
      app.confirmAvatarCrop();
      assert(app.getStatusText().includes('头像已更新并保存'), 'confirm success status missing');

      win.location.reload();
      await waitForFrameLoad();
      const reloadedApp = frame.contentWindow.__resumeApp__;
      const frameAfterReload = reloadedApp.getResumeData().avatarFrame;
      evidence.frameAfterReload = frameAfterReload;
      assert(JSON.stringify(frameAfterReload) === JSON.stringify(frameAfterDrag), 'frame did not survive reload');

      const reloadedDoc = frame.contentWindow.document;
      const anchorCount = reloadedDoc.querySelectorAll('.resume-left ul a').length;
      evidence.basicInfoAnchors = anchorCount;
      assert(anchorCount === 0, 'basicInfo still renders anchors');

      const oversizeFile = await loadFixture('/tests/fixtures/avatar-oversize.jpg', 'image/jpeg');
      await frame.contentWindow.handleAvatarUpload(oversizeFile);
      evidence.oversizeStatus = reloadedApp.getStatusText();
      assert(evidence.oversizeStatus.includes('文件不能超过 2 MB'), 'oversize status missing');

      frame.contentWindow.document.getElementById('export-data').click();
      const exported = JSON.parse(reloadedApp.getLastExportedJson());
      evidence.exportAvatarFrame = exported.avatarFrame;
      assert(exported.avatarFrame, 'export missing avatarFrame');
      assert(exported.basicInfo.every((item) => !Object.prototype.hasOwnProperty.call(item, 'url')), 'export still includes basicInfo.url');

      frame.contentWindow.eval(`
        window.__printCalled = 0;
        const originalPrint = window.print;
        window.print = () => { window.__printCalled += 1; };
        window.__restorePrint = () => { window.print = originalPrint; };
      `);
      frame.contentWindow.document.getElementById('print-pdf').click();
      await new Promise((resolve, reject) => {
        const startedAt = Date.now();
        const timer = setInterval(() => {
          if (frame.contentWindow.__printCalled === 1) {
            clearInterval(timer);
            resolve();
            return;
          }
          if (Date.now() - startedAt > 2000) {
            clearInterval(timer);
            reject(new Error('print timeout'));
          }
        }, 50);
      });
      evidence.printCalled = frame.contentWindow.__printCalled;
      assert(evidence.printCalled === 1, 'print did not fire once');
      frame.contentWindow.__restorePrint();

      const payload = { ok: true, evidence };
      statusNode.textContent = 'ok';
      resultNode.textContent = JSON.stringify(payload, null, 2);
      await report(payload);
    }

    run().catch((error) => {
      const payload = { ok: false, error: String(error && error.stack || error) };
      statusNode.textContent = 'error';
      resultNode.textContent = JSON.stringify(payload, null, 2);
      report(payload);
    });
  </script>
</body>
</html>
